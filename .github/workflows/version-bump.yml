# Manual action for incrementing the version

name: Bump Version

on: 
  workflow_dispatch:
    inputs:
      type:
        description: 'Version Type'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

jobs:
  bump:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        name: Use Node.js ${{ matrix.node-version }}
        with:
          node-version: ${{ matrix.node-version }}

      - name: Bump Version
        run: npm version ${{ inputs.type }} --no-commit-hooks --no-git-tag-version
      - name: Update Packages
        # update non-peer deps to latest in package.json
        # npm update to update all lock dependencies
        # npm i to resolve any lock descrepencies from update
        run: npx npm-check-updates --target semver -u && npm update && npm i
      - run: echo "Bump version to $(npm pkg get version --workspaces=false | tr -d \")"
      #- run: git commit -a -m "Bump version to $(npm pkg get version --workspaces=false | tr -d \")"
      #- run: git push origin
