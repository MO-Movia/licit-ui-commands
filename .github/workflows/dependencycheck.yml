# This workflow will do scan of dependencies to check for issues like vulnerabilities.

name: dependencycheck

on:
  push:
    branches: [develop, main, master]

jobs:
  dependencycheck:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm audit

      # Dependency-Check
      #- run: npx owasp-dependency-check --scan . --suppression ./suppression.xml --nvdApiKey ${{ secrets.NVD_KEY }} --exclude node_modules/node-gyp/**/*

      # Dependency-Track
      - run: npx @cyclonedx/cyclonedx-npm --package-lock-only --output-file SBOM.json
      - run: |
          response=$(curl --location '${{ secrets.DEPTRACK_URL }}' \
          --header 'X-Api-Key: ${{ secrets.DEPTRACK_KEY }}' \
          --form 'project="${{ secrets.DEPTRACK_PROJECT_ID }}"' \
          --form 'bom=@SBOM.json')
          echo "Response from curl= $response"
