# This workflow will do scan of dependencies to check for issues like vulnerabilities.

name: dependencycheck

on:
  push:
    branches: [develop, main, master, pipeline/test] #pipeline/test

jobs:
  dependencycheck:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm audit

      # Dependency-Check
      - run: npx owasp-dependency-check --scan . --failOnCVSS 1 --suppression suppression.xml --nvdApiKey ${{ secrets.NVD_KEY }} --disableYarnAudit --exclude node_modules/node-gyp/**/* --exclude dependency-check-bin/**/* 
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: dependency-check-reports
      - uses: actions/upload-artifact@v4
        with:
          name: html-dependency-check-report
          path: dependency-check-reports/dependency-check-report.html
      # Dependency-Track
      - run: npx @cyclonedx/cyclonedx-npm --package-lock-only --output-file SBOM.json
      - run: |
          response=$(curl --location '${{ secrets.DEPTRACK_URL }}' \
          --header 'X-Api-Key: ${{ secrets.DEPTRACK_KEY }}' \
          --form 'project="${{ secrets.DEPTRACK_PROJECT_ID }}"' \
          --form 'bom=@SBOM.json')
          echo "Response from curl= $response"
